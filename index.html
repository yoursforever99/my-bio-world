<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦向交友卡片生成器</title>
    <!-- 引入 Noto Serif SC 思源宋体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --p-pink: #FFDDE2;
            --p-yellow: #FFF5BA;
            --p-blue: #D0E8FF;
            --p-green: #D1F2EB;
            --p-lavender: #E8DFF5;
            --bg-gray: #F0F2F5;
            --text-dark: #2D3436;
        }

        * { box-sizing: border-box; }

        body {
            font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", "SimSun", Georgia, serif;
            background-color: var(--bg-gray);
            color: var(--text-dark);
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            display: flex;
            gap: 60px;
            max-width: 1100px;
            width: 100%;
            align-items: flex-start;
        }

        /* --- 输入面板 --- */
        .input-panel {
            flex: 1;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }

        h2 { margin-top: 0; margin-bottom: 30px; font-weight: 700; color: #444; letter-spacing: 0.5px; }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 14px; color: #555; }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #E9ECEF;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus { outline: none; border-color: var(--p-blue); }

        .form-group input[type="file"] { font-size: 13px; color: #888; }

        /* --- 选项/标签 样式 --- */
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip-group input[type="checkbox"],
        .chip-group input[type="radio"] { display: none; }
        .chip-group label {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid #E9ECEF;
            background: white;
            color: #777;
            transition: all 0.15s;
            margin-bottom: 0;
        }
        .chip-group input[type="checkbox"]:checked + label {
            background: var(--text-dark);
            color: white;
            border-color: var(--text-dark);
        }

        /* 梦向取向 颜色 */
        #inType_HL:checked   + label { background: #FFDDE2; color: #d63384; border-color: #f4a7be; }
        #inType_BL:checked   + label { background: #D0E8FF; color: #2d6fa3; border-color: #a0c8f0; }
        #inType_GL:checked   + label { background: #FFF5BA; color: #9a7800; border-color: #e0d060; }
        #inType_NCP:checked  + label { background: #D1F2EB; color: #087f5b; border-color: #80d8c0; }

        /* 开放/独占 颜色 */
        #inScope_open:checked + label { background: #D1F2EB; color: #087f5b; border-color: #80d8c0; }
        #inScope_only:checked + label { background: #E8DFF5; color: #6c40bd; border-color: #c0a0e8; }

        /* 互相帮拒 颜色 */
        #in1t1d_yes:checked + label,
        #in1t1d_no:checked  + label { background: #FFF0E0; color: #c96a00; border-color: #f4b878; }

       /* 修改后的 代入/非代入 选中颜色 */

/* 1. 代入（甜美桃粉）：选中时的背景、文字和边框颜色 */
#inImmerse_yes:checked + label { 
    background: #FFD0EC; 
    color: #9C005D; 
    border-color: #fca8db; 
}

/* 2. 非代入（清爽薄荷绿）：选中时的背景、文字和边框颜色 */
#inImmerse_no:checked + label { 
    background: #BFF6E4; 
    color: #006B52; 
    border-color: #8ce8cb; 
}
        /* --- 倾向设置分组 --- */
        .pref-group {
            background: #F8F9FB;
            border: 1.5px solid #EDF0F4;
            border-radius: 16px;
            padding: 20px 20px 6px;
        }
        .pref-group > .pref-group-title {
            font-size: 15px;
            font-weight: 700;
            color: #444;
            margin-bottom: 18px;
        }
        .pref-row { margin-bottom: 18px; }
        .pref-row .pref-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 13px;
            color: #777;
        }

        /* --- 图像缩放控制 --- */
        .size-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .size-control span { font-size: 12px; font-weight: 600; color: #777; white-space: nowrap; }
        .size-control input[type="range"] { flex: 1; accent-color: var(--text-dark); cursor: pointer; }

        /* --- 自定义标签 --- */
        .custom-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .custom-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 8px 6px 12px;
            border-radius: 16px;
            background: #FFF5BA;
            color: #9a7800;
            font-size: 13px;
            font-weight: 600;
        }
        .custom-chip button {
            border: none;
            background: rgba(154,120,0,0.18);
            color: #9a7800;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        /* --- 预览区域 --- */
        .preview-panel {
            flex: 1;
            position: sticky;
            top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 卡片 */
        .sheet-card {
            width: 420px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            position: relative;
        }

        /* 顶图背景 */
        .sheet-header {
            height: 160px;
            background-color: var(--p-lavender);
            position: relative;
            overflow: hidden;
        }

        #pvHeaderImg {
            position: absolute;
            cursor: grab;
            user-select: none;
            -webkit-user-drag: none;
        }
        #pvHeaderImg:active { cursor: grabbing; }

        .drag-hint {
            position: absolute;
            bottom: 7px;
            right: 10px;
            background: rgba(0,0,0,0.4);
            color: rgba(255,255,255,0.9);
            font-size: 10px;
            padding: 3px 9px;
            border-radius: 999px;
            pointer-events: none;
            transition: opacity 0.6s;
            font-family: inherit;
        }

        /* 头像 */
        .sheet-profile {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #e0e0e0;
            position: absolute;
            top: 110px;
            left: 30px;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            z-index: 2;
        }

        #pvProfileImg {
            position: absolute;
            cursor: grab;
            user-select: none;
            -webkit-user-drag: none;
        }
        #pvProfileImg:active { cursor: grabbing; }

        .sheet-body {
            padding: 70px 35px 40px 35px;
        }

        .tag-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .tag { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; line-height: 1; }
        #pvScopeTags, #pvTypeTags { display: contents; }
        .type-tag { background: var(--p-pink); color: #d63384; }
        .scope-tag { background: var(--p-green); color: #087f5b; }

        .sheet-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; font-family: "Noto Serif SC", serif; }
        .sheet-cp { font-size: 15px; color: #636e72; margin-bottom: 25px; border-bottom: 1px solid #f1f1f1; padding-bottom: 15px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .info-grid.single { grid-template-columns: 1fr; }
        .info-item b { display: block; font-size: 11px; color: #b2bec3; letter-spacing: 1px; margin-bottom: 5px; font-weight: 600; }
        .info-item span { font-size: 14px; font-weight: 600; }

        .info-full { margin-bottom: 20px; }
        .info-full b { display: block; font-size: 11px; color: #b2bec3; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
        .mini-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .mini-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background: var(--p-blue);
            color: #2d6fa3;
        }
        .mini-tag.yellow { background: var(--p-yellow); color: #9a7800; }

        .ng-box {
            background: #FFF0F3;
            padding: 18px;
            border-radius: 15px;
            font-size: 13px;
            line-height: 1.5;
        }
        .ng-box b { color: #ff7675; display: block; margin-bottom: 5px; font-size: 11px; font-weight: 600; }

        .header-credits {
            position: absolute;
            bottom: 7px;
            right: 10px;
            display: flex;
            gap: 5px;
            z-index: 4;
        }
        .header-credits span {
            background: rgba(0,0,0,0.35);
            color: rgba(255,255,255,0.8);
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 999px;
            font-family: inherit;
            pointer-events: none;
        }

        .export-btn {
            margin-top: 30px;
            width: 420px;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: var(--text-dark);
            color: white;
            font-family: inherit;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .export-btn:hover { background: #000; transform: translateY(-2px); }
        .export-btn:disabled { opacity: 0.6; transform: none; cursor: default; }
    </style>
</head>
<body>

<div class="container">
    <div class="input-panel">
        <h2>梦向交友卡片生成器</h2>

        <div class="form-group">
            <label>顶图背景（选择文件）</label>
            <input type="file" accept="image/*" onchange="loadHeader(event)">
            <div class="size-control" id="headerSizeControl" style="display:none;">
                <span>尺寸 / 缩放</span>
                <input type="range" id="headerSize" min="100" max="300" value="100" oninput="resizeImage('header')">
            </div>
        </div>

        <div class="form-group">
            <label>头像图片（选择文件）</label>
            <input type="file" accept="image/*" onchange="loadProfile(event)">
            <div class="size-control" id="profileSizeControl" style="display:none;">
                <span>尺寸 / 缩放</span>
                <input type="range" id="profileSize" min="100" max="300" value="100" oninput="resizeImage('profile')">
            </div>
        </div>

        <div class="form-group">
            <label>约稿出处 — 顶图</label>
            <input type="text" id="inCreditHeader" placeholder="画师名或出处链接（未输入时不显示）" oninput="update()">
        </div>

        <div class="form-group">
            <label>约稿出处 — 头像</label>
            <input type="text" id="inCreditProfile" placeholder="画师名或出处链接（未输入时不显示）" oninput="update()">
        </div>

        <div class="form-group">
            <label>梦向取向（可多选）</label>
            <div class="chip-group">
               <input type="checkbox" id="inType_HL" value="BG" checked onchange="update()">
<label for="inType_HL">BG</label>

<input type="checkbox" id="inType_BL" value="BL" onchange="update()">
<label for="inType_BL">BL</label>

<input type="checkbox" id="inType_GL" value="GL" onchange="update()">
<label for="inType_GL">GL</label>

<input type="checkbox" id="inType_NCP" value="NCP" onchange="update()">
<label for="inType_NCP">NCP</label>
            </div>
        </div>

        <div class="form-group pref-group">
            <label class="pref-group-title">梦向取向设置</label>

            <div class="pref-row">
                <span class="pref-label">开放 / 独占范围</span>
                <div class="chip-group">
                    <input type="radio" name="inScope" id="inScope_open" value="不拒同嫁" onchange="update()">
                    <label for="inScope_open">不拒同嫁</label>
                    <input type="radio" name="inScope" id="inScope_only" value="拒同嫁" onchange="update()">
                    <label for="inScope_only">拒同嫁</label>
                </div>
            </div>

            <div class="pref-row">
                <span class="pref-label">互相帮拒</span>
                <div class="chip-group">
                    <input type="radio" name="in1t1d" id="in1t1d_yes" value="⭕️" onchange="update()">
                    <label for="in1t1d_yes">⭕️</label>
                    <input type="radio" name="in1t1d" id="in1t1d_no" value="❌" onchange="update()">
                    <label for="in1t1d_no">❌</label>
                </div>
            </div>

            <div class="pref-row">
                <span class="pref-label">梦设定位</span>
                <div class="chip-group">
                    <input type="radio" name="inImmerse" id="inImmerse_yes" value="代入" onchange="update()">
                    <label for="inImmerse_yes">代入</label>
                    <input type="radio" name="inImmerse" id="inImmerse_no" value="非代入" onchange="update()">
                    <label for="inImmerse_no">非代入</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>昵称</label>
            <input type="text" id="inCP" placeholder="请输入昵称" oninput="update()">
        </div>

        <div class="form-group">
            <label>作品来源 / 梦向CP名</label>
            <input type="text" id="inGenre" placeholder="例如：FFXIV / Werenville" oninput="update()">
        </div>

        <div class="form-group">
            <label>纪念日（可选）</label>
            <input type="text" id="inDate" placeholder="仅在填写时显示于卡片（例如：2025.04.25）" oninput="update()">
        </div>

        <div class="form-group">
            <label>互动偏好（可多选）</label>
            <div class="chip-group">
                <input type="checkbox" id="ex_rt" value="转发" onchange="update()">
                <label for="ex_rt">转发</label>
                <input type="checkbox" id="ex_quote" value="小窗" onchange="update()">
                <label for="ex_quote">小窗</label>
                <input type="checkbox" id="ex_mention" value="评论" onchange="update()">
                <label for="ex_mention">评论</label>
                <input type="checkbox" id="ex_heart" value="点赞" onchange="update()">
                <label for="ex_heart">点赞</label>
            </div>
            <input type="text" id="exEtcInput" placeholder="输入其他内容后按 Enter 添加" onkeydown="addExTag(event)" style="margin-top:10px;">
            <div class="custom-tags" id="exCustomTags"></div>
        </div>

        <div class="form-group">
            <label>创作偏好（可多选）</label>
            <div class="chip-group">
                <input type="checkbox" id="tw_rt" value="转发" onchange="update()">
                <label for="tw_rt">转发</label>
                <input type="checkbox" id="tw_sub" value="考据" onchange="update()">
                <label for="tw_sub">考据</label>
                <input type="checkbox" id="tw_art" value="绘画" onchange="update()">
                <label for="tw_art">绘画</label>
                <input type="checkbox" id="tw_text" value="写作" onchange="update()">
                <label for="tw_text">写作</label>
                <input type="checkbox" id="tw_story" value="口嗨" onchange="update()">
                <label for="tw_story">口嗨</label>
                <input type="checkbox" id="tw_buy" value="吃谷" onchange="update()">
                <label for="tw_buy">吃谷</label>
            </div>
            <input type="text" id="twEtcInput" placeholder="输入其他内容后按 Enter 添加" onkeydown="addTweetTag(event)" style="margin-top:10px;">
            <div class="custom-tags" id="twCustomTags"></div>
        </div>

        <div class="form-group">
            <label>雷点</label>
            <textarea id="inNG" rows="2" placeholder="请填写雷点或避雷事项等" oninput="update()"></textarea>
        </div>

        <div class="form-group">
            <label>补充说明</label>
            <textarea id="inEtc" rows="2" placeholder="请自由填写补充说明" oninput="update()"></textarea>
        </div>
    </div>

    <div class="preview-panel">
        <div class="sheet-card" id="sheet">
            <!-- 顶图背景 -->
            <div class="sheet-header" id="pvHeader">
                <div class="drag-hint" id="headerDragHint" style="opacity:0; z-index:5;">拖拽调整位置</div>
                <div class="header-credits" id="pvCreditWrap" style="display:none;">
                    <span id="pvCreditHeader" style="display:none;"></span>
                    <span id="pvCreditProfile" style="display:none;"></span>
                </div>
            </div>
            <!-- 头像 -->
            <div class="sheet-profile" id="pvProfile"></div>

            <div class="sheet-body">
                <div class="tag-row">
                    <span id="pvTypeTags"><span class="tag type-tag" style="background:#FFDDE2;color:#d63384;">BG</span></span>
                    <span id="pvScopeTags"></span>
                    <span class="tag" id="pvImmerse" style="display:none;"></span>
                    <span class="tag" id="pvOneToOne" style="display:none;"></span>
                </div>
                <div class="sheet-title" id="pvCP">请输入昵称</div>
                <div class="sheet-cp" id="pvGenre">作品来源&nbsp;&nbsp;/&nbsp;梦向CP名</div>

                <div class="info-grid single" id="pvInfoGrid">
                    <div class="info-item" id="pvDateItem" style="display:none;"><b>纪念日</b><span id="pvDate">-</span></div>
                    <div class="info-item"><b>互动偏好</b><span id="pvExchange">-</span></div>
                </div>

                <div class="info-full">
                    <b>创作偏好</b>
                    <div class="mini-tags" id="pvTweetStyle"><span style="font-size:13px;color:#b2bec3;">-</span></div>
                </div>

                <div class="ng-box" id="pvNGWrap" style="display:none;">
                    <b>雷点</b>
                    <div id="pvNG"></div>
                </div>

                <div class="ng-box" id="pvEtcWrap" style="display:none; margin-top: 12px; background: #F0F4FF;">
                    <b style="color: #6c7fd8;">补充说明</b>
                    <div id="pvEtc"></div>
                </div>

            </div>
        </div>

        <button class="export-btn" id="exportBtn" onclick="saveImage()">保存卡片图片 (.png)</button>
    </div>
</div>

<script>
    function fitImage(img, container) {
        img._baseScale = Math.max(
            container.clientWidth  / img.naturalWidth,
            container.clientHeight / img.naturalHeight
        );
        img._zoom = 1;
        renderImageSize(img, container, false);
    }

    function renderImageSize(img, container, keepCenter) {
        const cw = container.clientWidth, ch = container.clientHeight;
        const newW = Math.round(img.naturalWidth  * img._baseScale * img._zoom);
        const newH = Math.round(img.naturalHeight * img._baseScale * img._zoom);

        if (keepCenter) {
            const oldW = img.offsetWidth  || newW;
            const oldH = img.offsetHeight || newH;
            const fx = (cw / 2 - (img._left || 0)) / oldW;
            const fy = (ch / 2 - (img._top  || 0)) / oldH;
            img._left = Math.round(cw / 2 - fx * newW);
            img._top  = Math.round(ch / 2 - fy * newH);
        } else {
            img._left = Math.round((cw - newW) / 2);
            img._top  = Math.round((ch - newH) / 2);
        }

        img.style.width  = newW + 'px';
        img.style.height = newH + 'px';
        clampImage(img, container);
    }

    function clampImage(img, container) {
        const cw = container.clientWidth, ch = container.clientHeight;
        img._left = Math.max(cw - img.offsetWidth,  Math.min(0, img._left || 0));
        img._top  = Math.max(ch - img.offsetHeight, Math.min(0, img._top  || 0));
        img.style.left = img._left + 'px';
        img.style.top  = img._top  + 'px';
    }

    function resizeImage(which) {
        const isHeader = which === 'header';
        const img = document.getElementById(isHeader ? 'pvHeaderImg' : 'pvProfileImg');
        if (!img) return;
        const container = document.getElementById(isHeader ? 'pvHeader' : 'pvProfile');
        const slider = document.getElementById(isHeader ? 'headerSize' : 'profileSize');
        img._zoom = parseInt(slider.value, 10) / 100;
        renderImageSize(img, container, true);
    }

    function loadHeader(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const header = document.getElementById('pvHeader');
            let img = document.getElementById('pvHeaderImg');
            if (!img) {
                img = document.createElement('img');
                img.id = 'pvHeaderImg';
                header.insertBefore(img, header.firstChild);
            }
            img.src = ev.target.result;
            img.onload = function() {
                fitImage(img, header);
                document.getElementById('headerSize').value = 100;
                document.getElementById('headerSizeControl').style.display = 'flex';
                const hint = document.getElementById('headerDragHint');
                hint.style.opacity = '1';
                setTimeout(() => { hint.style.opacity = '0'; }, 2000);
            };
        };
        reader.readAsDataURL(file);
    }

    function loadProfile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const profile = document.getElementById('pvProfile');
            let img = document.getElementById('pvProfileImg');
            if (!img) {
                img = document.createElement('img');
                img.id = 'pvProfileImg';
                profile.appendChild(img);
            }
            img.src = ev.target.result;
            img.onload = function() {
                fitImage(img, profile);
                document.getElementById('profileSize').value = 100;
                document.getElementById('profileSizeControl').style.display = 'flex';
            };
        };
        reader.readAsDataURL(file);
    }

    // 拖拽调整位置
    (function() {
        let dragging = false, activeImg = null, sx = 0, sy = 0;
        const DRAGGABLE = ['pvHeaderImg', 'pvProfileImg'];

        function getContainer(id) {
            return id === 'pvHeaderImg'
                ? document.getElementById('pvHeader')
                : document.getElementById('pvProfile');
        }

        function clampPos(img) {
            const c = getContainer(img.id);
            const cw = c.clientWidth, ch = c.clientHeight;
            img._left = Math.max(cw - img.offsetWidth,  Math.min(0, img._left || 0));
            img._top  = Math.max(ch - img.offsetHeight, Math.min(0, img._top  || 0));
            img.style.left = img._left + 'px';
            img.style.top  = img._top  + 'px';
        }

        document.addEventListener('mousedown', e => {
            if (!DRAGGABLE.includes(e.target.id)) return;
            dragging = true; activeImg = e.target;
            sx = e.clientX; sy = e.clientY;
            e.preventDefault();
        });
        document.addEventListener('mousemove', e => {
            if (!dragging || !activeImg) return;
            activeImg._left = (activeImg._left || 0) + (e.clientX - sx);
            activeImg._top  = (activeImg._top  || 0) + (e.clientY - sy);
            sx = e.clientX; sy = e.clientY;
            clampPos(activeImg);
        });
        document.addEventListener('mouseup', () => { dragging = false; activeImg = null; });

        document.addEventListener('touchstart', e => {
            if (!DRAGGABLE.includes(e.target.id)) return;
            dragging = true; activeImg = e.target;
            sx = e.touches[0].clientX; sy = e.touches[0].clientY;
        }, { passive: true });
        document.addEventListener('touchmove', e => {
            if (!dragging || !activeImg) return;
            activeImg._left = (activeImg._left || 0) + (e.touches[0].clientX - sx);
            activeImg._top  = (activeImg._top  || 0) + (e.touches[0].clientY - sy);
            sx = e.touches[0].clientX; sy = e.touches[0].clientY;
            clampPos(activeImg);
        }, { passive: true });
        document.addEventListener('touchend', () => { dragging = false; activeImg = null; });
    })();

    function getChecked(ids) {
        return ids.filter(id => document.getElementById(id).checked)
                  .map(id => document.getElementById(id).value);
    }

    const TYPE_COLORS = {
    'BG':  { bg: '#FFDDE2', color: '#d63384' },
    'BL':  { bg: '#D0E8FF', color: '#2d6fa3' },
    'GL':  { bg: '#FFF5BA', color: '#9a7800' },
    'NCP': { bg: '#D1F2EB', color: '#087f5b' },
};
    const SCOPE_COLORS = {
    // 不拒同嫁：清爽好相处的柠檬黄/奶油黄
   '不拒同嫁':   { bg: '#E8DFF5', color: '#6C40BD' },

    // 拒同嫁：有界限感但柔和的香草紫/芋泥紫
    '拒同嫁':   { bg: '#E8DFF5', color: '#6C40BD' },
};
const IMMERSE_COLORS = {
    '代入':   { bg: '#FFD0EC', color: '#9C005D' },
    '非代入': { bg: '#BFF6E4', color: '#006B52' },
};

    function escapeHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function handleTagEnter(e, commit) {
        if (e.key !== 'Enter') return;
        if (e.isComposing) { setTimeout(commit, 0); return; }
        e.preventDefault();
        commit();
    }

    // 创作偏好 其他标签
    let customTweetTags = [];
    function addTweetTag(e) { handleTagEnter(e, commitTweetTag); }
    function commitTweetTag() {
        const input = document.getElementById('twEtcInput');
        const val = input.value.trim();
        if (val && !customTweetTags.includes(val)) {
            customTweetTags.push(val);
            renderCustomTweetTags();
            update();
        }
        input.value = '';
    }
    function removeTweetTag(idx) {
        customTweetTags.splice(idx, 1);
        renderCustomTweetTags();
        update();
    }
    function renderCustomTweetTags() {
        document.getElementById('twCustomTags').innerHTML = customTweetTags.map((t, i) =>
            `<span class="custom-chip">${escapeHtml(t)}` +
            `<button type="button" onclick="removeTweetTag(${i})">&times;</button></span>`
        ).join('');
    }

    // 互动偏好 其他标签
    let customExTags = [];
    function addExTag(e) { handleTagEnter(e, commitExTag); }
    function commitExTag() {
        const input = document.getElementById('exEtcInput');
        const val = input.value.trim();
        if (val && !customExTags.includes(val)) {
            customExTags.push(val);
            renderCustomExTags();
            update();
        }
        input.value = '';
    }
    function removeExTag(idx) {
        customExTags.splice(idx, 1);
        renderCustomExTags();
        update();
    }
    function renderCustomExTags() {
        document.getElementById('exCustomTags').innerHTML = customExTags.map((t, i) =>
            `<span class="custom-chip">${escapeHtml(t)}` +
            `<button type="button" onclick="removeExTag(${i})">&times;</button></span>`
        ).join('');
    }

    function update() {
        document.getElementById('pvCP').innerText = document.getElementById('inCP').value || "请输入昵称";
        const genreRaw = document.getElementById('inGenre').value || "作品来源 / 梦向CP名";
        document.getElementById('pvGenre').innerHTML = genreRaw
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\s*\/\s*/g, '&nbsp;&nbsp;/&nbsp;');
        const dateVal = document.getElementById('inDate').value.trim();
        const dateItem = document.getElementById('pvDateItem');
        const infoGrid = document.getElementById('pvInfoGrid');
        if (dateVal) {
            document.getElementById('pvDate').innerText = dateVal;
            dateItem.style.display = '';
            infoGrid.classList.remove('single');
        } else {
            dateItem.style.display = 'none';
            infoGrid.classList.add('single');
        }

        const typeVals = getChecked(['inType_HL','inType_BL','inType_GL','inType_NCP']);
        document.getElementById('pvTypeTags').innerHTML = typeVals
            .map(v => `<span class="tag type-tag" style="background:${TYPE_COLORS[v].bg};color:${TYPE_COLORS[v].color};">${v}</span>`)
            .join('');

        const scopeVal = document.querySelector('input[name="inScope"]:checked')?.value;
        document.getElementById('pvScopeTags').innerHTML = scopeVal
            ? `<span class="tag" style="background:${SCOPE_COLORS[scopeVal].bg};color:${SCOPE_COLORS[scopeVal].color};">${scopeVal}</span>`
            : '';

        const immerseVal = document.querySelector('input[name="inImmerse"]:checked')?.value;
        const pvImmerse = document.getElementById('pvImmerse');
        if (immerseVal) {
            pvImmerse.style.display = '';
            pvImmerse.style.background = IMMERSE_COLORS['代入'].bg;
            pvImmerse.style.color      = IMMERSE_COLORS['代入'].color;
            pvImmerse.innerText = immerseVal;
        } else {
            pvImmerse.style.display = 'none';
        }

        const oneToOne = document.querySelector('input[name="in1t1d"]:checked')?.value;
        const pvOneToOne = document.getElementById('pvOneToOne');
        if (oneToOne) {
            pvOneToOne.style.display = '';
            const isYes = oneToOne === '⭕️';
            pvOneToOne.style.background = '#FFF0E0';
            pvOneToOne.style.color      = '#c96a00';
            const symbol = isYes
                ? `<span style="display:inline-block;width:13px;height:13px;border-radius:50%;border:2.5px solid #e53e3e;flex-shrink:0;"></span>`
                : `<span style="display:inline-block;font-size:13px;line-height:1;color:#e53e3e;font-weight:900;">&#x2715;</span>`;
            pvOneToOne.innerHTML = `互相帮拒&nbsp;&nbsp;${symbol}`;
        } else {
            pvOneToOne.style.display = 'none';
        }

        const ngVal = document.getElementById('inNG').value.trim();
        const ngWrap = document.getElementById('pvNGWrap');
        ngWrap.style.display = ngVal ? '' : 'none';
        document.getElementById('pvNG').innerText = ngVal;

        const etcVal = document.getElementById('inEtc').value.trim();
        const etcWrap = document.getElementById('pvEtcWrap');
        etcWrap.style.display = etcVal ? '' : 'none';
        document.getElementById('pvEtc').innerText = etcVal;

        const tweetSel = getChecked(['tw_rt','tw_sub','tw_art','tw_text','tw_story','tw_buy'])
            .concat(customTweetTags);
        document.getElementById('pvTweetStyle').innerHTML = tweetSel.length
            ? tweetSel.map(v => `<span class="mini-tag yellow">${escapeHtml(v)}</span>`).join('')
            : '<span style="font-size:13px;color:#b2bec3;">-</span>';

        const exSel = getChecked(['ex_rt','ex_quote','ex_mention','ex_heart']).concat(customExTags);
        document.getElementById('pvExchange').innerText = exSel.length ? exSel.join(' / ') : '-';

        const creditH = document.getElementById('inCreditHeader').value.trim();
        const creditP = document.getElementById('inCreditProfile').value.trim();
        const pvCreditH = document.getElementById('pvCreditHeader');
        const pvCreditP = document.getElementById('pvCreditProfile');
        pvCreditH.textContent = creditH;
        pvCreditP.textContent = creditP;
        pvCreditH.style.display = creditH ? '' : 'none';
        pvCreditP.style.display = creditP ? '' : 'none';
        document.getElementById('pvCreditWrap').style.display = (creditH || creditP) ? '' : 'none';
    }

    async function saveImage() {
        const btn = document.getElementById('exportBtn');
        btn.textContent = '正在保存...';
        btn.disabled = true;

        document.getElementById('headerDragHint').style.opacity = '0';

        try {
            const canvas = await html2canvas(document.getElementById('sheet'), {
                scale: 3,
                backgroundColor: null,
                useCORS: true,
                allowTaint: true,
                logging: false
            });
            const link = document.createElement('a');
            link.download = 'dream-sheet.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch(e) {
            alert('保存失败，请重试。');
            console.error(e);
        }

        btn.textContent = '保存卡片图片 (.png)';
        btn.disabled = false;
    }

    update();
</script>
</body>
</html>
